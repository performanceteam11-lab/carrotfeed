name: Daily Feed Update

on:
  schedule:
    - cron: "0 0 * * *"  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl lxml playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Update feed CSV
        run: python update_feed.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sharkninja_feed.csv
          git diff --staged --quiet || git commit -m "chore: daily feed update $(date +'%Y-%m-%d')"
          git push
